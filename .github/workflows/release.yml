name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  ZIG_VERSION: "0.15.2"

jobs:
  release:
    runs-on: macos-15
    environment: Nexus
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build libghostty
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Doptimize=ReleaseFast -Demit-macos-app=false
          # Extract the macOS universal lib from the installed xcframework
          mkdir -p ../lib
          # zig-out may be relative to the ghostty dir or the repo root
          MACOS_LIB=$(find . "$ZIG_LOCAL_CACHE_DIR" -path "*/macos-*/libghostty.a" -type f 2>/dev/null | head -1)
          if [ -z "$MACOS_LIB" ]; then
            echo "::error::Could not find macOS libghostty.a in xcframework output"
            echo "Searching for any libghostty files:"
            find . "$ZIG_LOCAL_CACHE_DIR" -name "libghostty*" -type f 2>/dev/null
            exit 1
          fi
          cp "$MACOS_LIB" ../lib/libghostty.a

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate --spec project.yml

      - name: Build archive
        run: |
          xcodebuild archive \
            -scheme Nexus \
            -archivePath build/Nexus.xcarchive \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CURRENT_PROJECT_VERSION=${{ steps.version.outputs.version }} \
            MARKETING_VERSION=${{ steps.version.outputs.version }}

      - name: Create DMG
        run: |
          brew install create-dmg
          mkdir -p build/dmg
          cp -R build/Nexus.xcarchive/Products/Applications/Nexus.app build/dmg/
          create-dmg \
            --volname "Nexus" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Nexus.app" 150 190 \
            --app-drop-link 450 190 \
            "build/Nexus-${{ steps.version.outputs.version }}.dmg" \
            "build/dmg/"

      - name: Sign DMG with Sparkle
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Download Sparkle tools
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.7.5/Sparkle-2.7.5.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle
          tar xf /tmp/sparkle.tar.xz -C /tmp/sparkle

          DMG="build/Nexus-${{ steps.version.outputs.version }}.dmg"

          # sign_update reads the key from stdin when using -f -
          OUTPUT=$(/tmp/sparkle/bin/sign_update "$DMG" -f <(printf '%s' "$SPARKLE_PRIVATE_KEY"))

          # Output format: sparkle:edSignature="..." length="..."
          SIGNATURE=$(echo "$OUTPUT" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')
          LENGTH=$(stat -f%z "$DMG")

          echo "signature=${SIGNATURE}" >> "$GITHUB_OUTPUT"
          echo "length=${LENGTH}" >> "$GITHUB_OUTPUT"

      - name: Update appcast.xml
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SIGNATURE: ${{ steps.sign.outputs.signature }}
          LENGTH: ${{ steps.sign.outputs.length }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, datetime, email.utils

          version = os.environ["VERSION"]
          signature = os.environ["SIGNATURE"]
          length = os.environ["LENGTH"]
          tag = os.environ["TAG_NAME"]
          repo = os.environ["REPO"]
          pub_date = email.utils.formatdate(localtime=True)
          dmg_url = f"https://github.com/{repo}/releases/download/{tag}/Nexus-{version}.dmg"

          item = f"""    <item>
              <title>Version {version}</title>
              <pubDate>{pub_date}</pubDate>
              <sparkle:version>{version}</sparkle:version>
              <sparkle:shortVersionString>{version}</sparkle:shortVersionString>
              <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
              <enclosure
                url="{dmg_url}"
                sparkle:edSignature="{signature}"
                length="{length}"
                type="application/octet-stream" />
            </item>"""

          with open("appcast.xml") as f:
              content = f.read()

          content = content.replace("  </channel>", item + "\n  </channel>", 1)

          with open("appcast.xml", "w") as f:
              f.write(content)
          PYEOF

      - name: Commit appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "release: update appcast for ${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Nexus-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true
          draft: false
