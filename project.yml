name: Nex
options:
  bundleIdPrefix: com.benfriebe
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: "4ASXCG2599"
    ENABLE_HARDENED_RUNTIME: true
  configs:
    Debug:
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
    Release:
      CODE_SIGN_IDENTITY: "Developer ID Application"
      CODE_SIGN_STYLE: Manual

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    version: 1.17.1
  GRDB:
    url: https://github.com/groue/GRDB.swift
    version: 7.3.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  swift-markdown:
    url: https://github.com/swiftlang/swift-markdown
    from: "0.5.0"

targets:
  Nex:
    type: application
    platform: macOS
    sources:
      - path: Nex
        excludes:
          - "**/*.h"
          - "**/*.c"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benfriebe.nex
        PRODUCT_NAME: Nex
        INFOPLIST_FILE: Nex/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Nex/Nex.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Nex/Ghostty/Ghostty-Bridging-Header.h
        OTHER_LDFLAGS:
          - "-lc++"
          - "-lz"
          - "-L$(SRCROOT)/lib"
          - "-lghostty"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/ghostty/include"
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: ComposableArchitecture
      - package: GRDB
        product: GRDB
      - package: Sparkle
      - package: swift-markdown
        product: Markdown
      - sdk: Metal.framework
      - sdk: WebKit.framework
      - sdk: QuartzCore.framework
      - sdk: CoreText.framework
      - sdk: AppKit.framework
      - sdk: IOKit.framework
      - sdk: Foundation.framework
      - sdk: Carbon.framework
    postCompileScripts:
      - script: |
          mkdir -p "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Helpers"
          swiftc -O -target arm64-apple-macos14.0 -o "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Helpers/nex" "${SRCROOT}/Tools/nex-cli/nex.swift"
          codesign --force --sign "Developer ID Application: BENJAMIN RYAN FRIEBE (4ASXCG2599)" --timestamp "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Helpers/nex"
          mkdir -p "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/scripts"
          cp "${SRCROOT}/scripts/install-hooks.sh" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/scripts/install-hooks.sh"
          chmod +x "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/scripts/install-hooks.sh"
          codesign --force --sign "Developer ID Application: BENJAMIN RYAN FRIEBE (4ASXCG2599)" --timestamp "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/scripts/install-hooks.sh"
          mkdir -p "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/skills/nex-agentic"
          cp "${SRCROOT}/Resources/skills/nex-agentic/SKILL.md" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/skills/nex-agentic/SKILL.md"
          # Bundle ghostty shell-integration and terminfo so libghostty can
          # auto-detect resources and enable shell integration (OSC 7 pwd
          # reporting, prompt marking, etc.)
          GHOSTTY_SHARE="${SRCROOT}/ghostty/zig-out/share"
          RESOURCES="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources"
          if [ -d "${GHOSTTY_SHARE}/ghostty/shell-integration" ]; then
            rm -rf "${RESOURCES}/ghostty/shell-integration" "${RESOURCES}/terminfo"
            mkdir -p "${RESOURCES}/ghostty"
            cp -R "${GHOSTTY_SHARE}/ghostty/shell-integration" "${RESOURCES}/ghostty/shell-integration"
            if [ -d "${GHOSTTY_SHARE}/terminfo" ]; then
              cp -R "${GHOSTTY_SHARE}/terminfo" "${RESOURCES}/terminfo"
            fi
          fi
          # Bundle popular themes so ghostty's theme = <name> config key works
          THEMES_SRC="${GHOSTTY_SHARE}/ghostty/themes"
          THEMES_DST="${RESOURCES}/ghostty/themes"
          if [ -d "${THEMES_SRC}" ]; then
            mkdir -p "${THEMES_DST}"
            for THEME in "Dracula" "Catppuccin Mocha" "Catppuccin Latte" \
                         "Catppuccin Macchiato" "Catppuccin Frappe" "Nord" \
                         "Gruvbox Dark" "Gruvbox Light" \
                         "iTerm2 Solarized Dark" "iTerm2 Solarized Light"; do
              cp "${THEMES_SRC}/${THEME}" "${THEMES_DST}/${THEME}"
            done
          fi
        name: Bundle nex CLI and install script

  NexTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NexTests
    dependencies:
      - target: Nex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benfriebe.nex.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Nex.app/Contents/MacOS/Nex"
        BUNDLE_LOADER: "$(TEST_HOST)"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/ghostty/include"
